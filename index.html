<body class="antialiased">
    
    <div id="app"></div>

    <script>
        // --- SVG ICONS ---
        const icons = {
            mapPin: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>`,
            sunrise: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m19.07 4.93-1.41 1.41"></path><path d="M22 17v3a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-3"></path><path d="m7 16 5-5 5 5"></path></svg>`,
            moon: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>`,
            flag: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>`,
            clock: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
            info: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>`,
            chevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
            chevronRight: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`,
            menu: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>`
        };

        // --- APP STATE ---
        let state = {
            view: 'loading',
            matches: [],
            itinerary: [],
            selectedMatchId: null,
            currentItineraryDay: 0
        };

        // --- GOOGLE SHEETS URLS ---
        const sheetUrls = {
            itinerary: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWo3Yh7t25FQHKWbwOwlBMqlS0KvH89mCw494kbiHakFe7jbmTxHwu4V6oRwI0_E6upPCv9MgwN23i/pub?gid=0&single=true&output=csv',
            matches: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWo3Yh7t25FQHKWbwOwlBMqlS0KvH89mCw494kbiHakFe7jbmTxHwu4V6oRwI0_E6upPCv9MgwN23i/pub?gid=2141277357&single=true&output=csv',
            holes: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWo3Yh7t25FQHKWbwOwlBMqlS0KvH89mCw494kbiHakFe7jbmTxHwu4V6oRwI0_E6upPCv9MgwN23i/pub?gid=1612329092&single=true&output=csv'
        };

        // --- CORE FUNCTIONS ---
        const appDiv = document.getElementById('app');

        function setView(viewName, matchId = null) {
            state.view = viewName;
            if (matchId) state.selectedMatchId = matchId;
            render();
        }

        function setItineraryDay(index) {
            state.currentItineraryDay = index;
            render();
        }

        // Helper to format YouTube URLs for autoplay and mute
        const formatYouTubeUrl = (url) => {
            if (!url) return '';
            let videoId = '';
            if (url.includes('embed/')) {
                videoId = url.split('embed/')[1].split('?')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('watch?v=')) {
                videoId = url.split('watch?v=')[1].split('&')[0];
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1` : url;
        };

        // --- DATA FETCHING ---
        async function fetchGoogleSheetsData() {
            try {
                const fetchCSV = (url) => new Promise((resolve, reject) => {
                    Papa.parse(url, { 
                        download: true, 
                        header: true, 
                        skipEmptyLines: true, 
                        complete: (results) => resolve(results.data),
                        error: (err) => reject(err)
                    });
                });

                const [rawItinerary, rawMatches, rawHoles] = await Promise.all([
                    fetchCSV(sheetUrls.itinerary),
                    fetchCSV(sheetUrls.matches),
                    fetchCSV(sheetUrls.holes)
                ]);

                // BULLETPROOF MAPPING LOGIC
                state.matches = rawMatches.map(match => {
                    // Hunt for the ID column regardless of exact spelling/casing
                    const mId = match.matchId || match.id || match.MatchId || match.MatchID || '';
                    
                    // Filter holes to belong to this match
                    const matchingHoles = rawHoles.filter(hole => {
                        const hId = hole.matchId || hole.id || hole.MatchId || hole.MatchID || '';
                        return hId && mId && String(hId).trim().toLowerCase() === String(mId).trim().toLowerCase();
                    });

                    return {
                        id: String(mId).trim(), 
                        course: match.course, 
                        date: match.date, 
                        matchUp: match.matchUp, 
                        video: formatYouTubeUrl(match.video),
                        holes: matchingHoles.map(hole => ({
                            number: parseInt(hole.number) || 0, 
                            name: hole.name || '', 
                            par: parseInt(hole.par) || 0, 
                            yardage: parseInt(hole.yardage) || 0, 
                            tip: hole.tip || ''
                        }))
                    };
                });

                state.itinerary = rawItinerary.map(day => ({
                    day: day.day, date: day.date, country: day.country, wakeUp: day.wakeUp, sleep: day.sleep, quote: day.quote,
                    // Link the matches to the itinerary day based on the date
                    golf: state.matches.filter(m => String(m.date).trim() === String(day.date).trim()).map(m => ({ course: m.course, time: "TBD", matchId: m.id })),
                    schedule: [], 
                    intel: { city: day.intel_city, description: day.intel_desc, hotel: day.intel_hotel, hotspots: day.intel_hotspots ? day.intel_hotspots.split('|') : [] }
                }));

                setView('menu');
            } catch (error) {
                console.error("Error fetching data. Check CSV URLs.", error);
                appDiv.innerHTML = `<div class="min-h-screen flex items-center justify-center bg-red-900 text-white p-6 text-center">Error loading data. Check console.</div>`;
            }
        }

        // --- RENDER VIEWS ---
        function render() {
            if (state.view === 'loading') {
                appDiv.innerHTML = `<div class="min-h-screen flex flex-col items-center justify-center bg-golf-900 text-white font-serif text-2xl fade-in">Loading Tour Intel...</div>`;
            } else if (state.view === 'menu') {
                appDiv.innerHTML = renderMainMenu();
            } else if (state.view === 'matches') {
                appDiv.innerHTML = renderMatchList();
            } else if (state.view === 'singleMatch') {
                appDiv.innerHTML = renderSingleMatch();
            } else if (state.view === 'itinerary') {
                appDiv.innerHTML = renderItinerary();
                attachSwipeListeners();
            }
        }

        const renderFooter
