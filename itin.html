<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland & Ireland Golf Tour 2026</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        golf: {
                            900: '#064e3b', // Deep green
                            800: '#065f46',
                            700: '#047857',
                            100: '#d1fae5',
                            50: '#ecfdf5'
                        },
                        gold: {
                            600: '#d97706',
                            500: '#f59e0b',
                            100: '#fef3c7'
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS (Inline SVGs for reliability) ---
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconSunrise = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m19.07 4.93-1.41 1.41"></path><path d="M22 17v3a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-3"></path><path d="m7 16 5-5 5 5"></path></svg>;
        const IconMoon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>;
        const IconFlag = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;

        // --- DATA ---
        const itineraryData = [
            {
                day: "Saturday", date: "June 6", country: "SCOTLAND", wakeUp: "Edinburgh", sleep: "Edinburgh",
                golf: [],
                schedule: [
                    { time: "All Day", event: "Recovery Day - Saturday on Rose Street" }
                ],
                intel: {
                    city: "Edinburgh",
                    hotel: "Central Edinburgh Hotel (e.g., The Balmoral)",
                    description: "Scotland's hilly capital, featuring a medieval Old Town and elegant Georgian New Town.",
                    hotspots: [
                        "The Auld Hundred (100 Rose St) - Traditional pub with a cozy atmosphere.",
                        "Element Bar (110 Rose St) - Stylish dining & cocktails.",
                        "Rose Street Brewery - Famous historic pub for perfect pints."
                    ]
                }
            },
            {
                day: "Sunday", date: "June 7", country: "SCOTLAND", wakeUp: "Edinburgh", sleep: "Edinburgh",
                golf: [],
                schedule: [
                    { time: "Morning", event: "Scotty Arrives, recovery day." },
                    { time: "1:00 PM", event: "Head up to Wallace Monument (hour drive)" },
                    { time: "6:15 PM", event: "Dinner @ Single Malt Whisky Society Vaults" }
                ],
                intel: {
                    city: "Edinburgh / Leith",
                    hotel: "Central Edinburgh Hotel",
                    description: "The SMWS Vaults in Leith is the spiritual home of the Society, offering incredible exclusive casks in a historic 12th-century building.",
                    hotspots: ["SMWS The Vaults (Leith) - Premium whisky tasting experience."]
                }
            },
            {
                day: "Monday", date: "June 8", country: "SCOTLAND", wakeUp: "Edinburgh", sleep: "Aberlady",
                golf: [
                    { course: "Dunbar Golf Club", time: "10:09 AM", cost: "$230" },
                    { course: "Craigielaw Golf Club", time: "3:50 PM", cost: "$276" }
                ],
                schedule: [
                    { time: "Evening", event: "Dinner at Craigielaw" }
                ],
                intel: {
                    city: "Aberlady (East Lothian)",
                    hotel: "The Lodge at Craigielaw",
                    description: "A superb base on Scotland's 'Golf Coast'. The Lodge blends modern comfort with waterfront charm, offering stunning views over Aberlady Bay.",
                    hotspots: ["The Courtyard at Craigielaw - Great on-site dining and whisky after your round."]
                }
            },
            {
                day: "Tuesday", date: "June 9", country: "SCOTLAND", wakeUp: "Aberlady", sleep: "Carnoustie",
                golf: [
                    { course: "Kingsbarns Golf Links", time: "11:20 AM", cost: "$919" }
                ],
                schedule: [
                    { time: "7:00 PM", event: "Dinner at The Rookery Carnoustie" }
                ],
                intel: {
                    city: "Carnoustie / St Andrews",
                    hotel: "Carnoustie Area Hotel",
                    description: "Kingsbarns offers sweeping ocean views from almost every hole. The Rookery provides panoramic views of the Carnoustie Golf Links.",
                    hotspots: ["The Rookery - Premium dining overlooking the iconic Carnoustie Championship course."]
                }
            },
            {
                day: "Wednesday", date: "June 10", country: "SCOTLAND", wakeUp: "Carnoustie", sleep: "Montrose",
                golf: [
                    { course: "Carnoustie Golf Links", time: "10:00 AM", cost: "$683" }
                ],
                schedule: [
                    { time: "4:00 PM", event: "Check in to Montrose" },
                    { time: "6:00 PM - 8:00 PM", event: "Dinner Charcuterie and Gin" },
                    { time: "8:00 PM - 11:00 PM", event: "Relax at Montrose" }
                ],
                intel: {
                    city: "Montrose",
                    hotel: "Montrose Area Hotel (e.g., Links Hotel)",
                    description: "A coastal town known for its wide tidal basin and historic golf links (the 5th oldest in the world).",
                    hotspots: ["Local Gin Bars - Perfect for a relaxed evening of Scottish Gin and charcuterie."]
                }
            },
            {
                day: "Thursday", date: "June 11", country: "SCOTLAND", wakeUp: "Montrose", sleep: "Dowans",
                golf: [],
                schedule: [
                    { time: "7:30 AM", event: "Drive to Fi" },
                    { time: "9:00 AM - 1:00 PM", event: "F (Activity/Free Time)" },
                    { time: "4:00 PM - 7:00 PM", event: "Distillery Dinner Afternoon" },
                    { time: "Evening", event: "Dinner at Dowans" }
                ],
                intel: {
                    city: "Aberlour (Speyside)",
                    hotel: "The Dowans Hotel of Speyside",
                    description: "Nestled in the heart of whisky country. The Dowans is a haven of luxury with 'The Still' bar stocking over 750 rare whiskies.",
                    hotspots: [
                        "The Still (On-site) - An incredible whisky collection.",
                        "Restaurant 57 (On-site) - Exquisite local Scottish terroir."
                    ]
                }
            },
            {
                day: "Friday", date: "June 12", country: "SCO/IRE", wakeUp: "Dowans", sleep: "Belfast",
                golf: [],
                schedule: [
                    { time: "Morning", event: "Hike and swim in Spey" },
                    { time: "9:00 AM", event: "Leave Hotel" },
                    { time: "2:05 PM", event: "Flight to Belfast" },
                    { time: "3:00 PM", event: "Arrive in Belfast, get car" },
                    { time: "Evening", event: "Friday night in Cathedral District!" }
                ],
                intel: {
                    city: "Belfast",
                    hotel: "Belfast City (Cathedral Quarter area)",
                    description: "The Cathedral Quarter is Belfast's beating cultural heart, full of cobblestone streets, vibrant street art, and legendary pubs.",
                    hotspots: [
                        "Duke of York - Iconic pub with an umbrella-filled alleyway.",
                        "The Dirty Onion - Authentic pub in an old timber-framed building with a huge beer garden.",
                        "Sunflower Public House - Famous local spot with great craft beer."
                    ]
                }
            },
            {
                day: "Saturday", date: "June 13", country: "IRELAND", wakeUp: "Belfast", sleep: "Belfast",
                golf: [
                    { course: "Portstewart", time: "3:50 PM", cost: "$637" },
                    { course: "Giants Causeway", time: "10:00 AM", cost: "Sightseeing" }
                ],
                schedule: [
                    { time: "10:00 AM", event: "Drive to Giants Causeway" },
                    { time: "Evening", event: "Saturday Night in Cathedral District!" }
                ],
                intel: {
                    city: "Northern Ireland Coast",
                    hotel: "Belfast City",
                    description: "Portstewart boasts towering sand dunes and incredible views of the Donegal hills. The Giant's Causeway is a geological wonder.",
                    hotspots: ["Cathedral Quarter - Round 2 in Belfast's best nightlife district."]
                }
            },
            {
                day: "Sunday", date: "June 14", country: "IRELAND", wakeUp: "Belfast", sleep: "Dublin",
                golf: [
                    { course: "Malone Golf Club", time: "11:00 AM", cost: "$295" }
                ],
                schedule: [
                    { time: "Afternoon", event: "Travel to Dublin" },
                    { time: "Evening", event: "Sunday Sessions in Temple Bar" }
                ],
                intel: {
                    city: "Dublin",
                    hotel: "Dublin City Centre",
                    description: "Ireland's vibrant capital. Temple Bar is the iconic tourist and cultural quarter known for lively traditional music.",
                    hotspots: [
                        "Temple Bar Pub - The famous red corner pub, incredibly lively.",
                        "The Oliver St. John Gogarty - Great for live Sunday trad sessions."
                    ]
                }
            },
            {
                day: "Monday", date: "June 15", country: "IRELAND", wakeUp: "Dublin", sleep: "Dublin",
                golf: [
                    { course: "The Island Course", time: "9:30 AM", cost: "$543" }
                ],
                schedule: [
                    { time: "Afternoon", event: "Guinness Storehouse and Jameson" },
                    { time: "Evening", event: "Monday Night on Baggot Street" }
                ],
                intel: {
                    city: "Dublin",
                    hotel: "Dublin City Centre",
                    description: "A perfect mix of links golf on the coast followed by Dublin's most iconic exports: Guinness and Jameson.",
                    hotspots: [
                        "Doheny & Nesbitt (Baggot St) - Historic Victorian pub since 1828. Famous for its original snugs, perfect pints, and Irish stew.",
                        "Guinness Storehouse - The panoramic Gravity Bar is a must-visit."
                    ]
                }
            },
            {
                day: "Tuesday", date: "June 16", country: "IRELAND", wakeUp: "Dublin", sleep: "Dublin",
                golf: [
                    { course: "Portmarnock Golf Club", time: "9:50 AM", cost: "$775" }
                ],
                schedule: [
                    { time: "Evening", event: "Tuesday Night in Merrion Square" }
                ],
                intel: {
                    city: "Dublin",
                    hotel: "Dublin City Centre",
                    description: "Portmarnock is consistently ranked among the top links courses globally. Merrion Square offers elegant Georgian architecture.",
                    hotspots: ["Merrion Square Area - Upscale dining and traditional pubs surrounded by historic Dublin."]
                }
            },
            {
                day: "Wednesday", date: "June 17", country: "IRELAND", wakeUp: "Dublin", sleep: "Toronto",
                golf: [],
                schedule: [
                    { time: "All Day", event: "Travel Day back home" }
                ],
                intel: {
                    city: "Dublin -> Toronto",
                    hotel: "Home",
                    description: "Safe travels back to Canada!",
                    hotspots: []
                }
            }
        ];

        // --- COMPONENTS ---

        const App = () => {
            const [currentDay, setCurrentDay] = useState(0);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);

            const minSwipeDistance = 50;

            const onTouchStart = (e) => {
                setTouchEnd(null);
                setTouchStart(e.targetTouches[0].clientX);
            };

            const onTouchMove = (e) => {
                setTouchEnd(e.targetTouches[0].clientX);
            };

            const onTouchEndHandler = () => {
                if (!touchStart || !touchEnd) return;
                const distance = touchStart - touchEnd;
                const isLeftSwipe = distance > minSwipeDistance;
                const isRightSwipe = distance < -minSwipeDistance;
                
                if (isLeftSwipe && currentDay < itineraryData.length - 1) {
                    setCurrentDay(prev => prev + 1);
                }
                if (isRightSwipe && currentDay > 0) {
                    setCurrentDay(prev => prev - 1);
                }
            };

            const dayData = itineraryData[currentDay];

            return (
                <div className="min-h-screen flex flex-col font-sans text-slate-800">
                    {/* App Header */}
                    <header className="bg-golf-900 text-white shadow-md relative z-10">
                        <div className="max-w-4xl mx-auto px-4 py-6 text-center">
                            <h1 className="text-2xl md:text-3xl font-serif font-bold tracking-wide">Scotland & Ireland Golf Tour</h1>
                            <p className="text-golf-100 text-sm md:text-base mt-2">June 6 – June 17, 2026</p>
                        </div>
                    </header>

                    {/* Date Horizontal Selector */}
                    <div className="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-20">
                        <div className="max-w-4xl mx-auto px-2 py-3 flex overflow-x-auto hide-scrollbar snap-x snap-mandatory">
                            {itineraryData.map((d, idx) => (
                                <button 
                                    key={idx}
                                    onClick={() => setCurrentDay(idx)}
                                    className={`flex-shrink-0 snap-center mx-1 px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 whitespace-nowrap
                                        ${currentDay === idx 
                                            ? 'bg-golf-800 text-white shadow-md' 
                                            : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                >
                                    {d.date}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content Area (Swipeable) */}
                    <main 
                        className="flex-grow max-w-4xl w-full mx-auto p-4 md:p-6 overflow-hidden"
                        onTouchStart={onTouchStart}
                        onTouchMove={onTouchMove}
                        onTouchEnd={onTouchEndHandler}
                    >
                        <div className="flex justify-between items-center mb-6">
                            <button 
                                onClick={() => setCurrentDay(prev => Math.max(0, prev - 1))}
                                className={`p-2 rounded-full ${currentDay === 0 ? 'text-slate-300' : 'text-golf-800 hover:bg-golf-50'}`}
                                disabled={currentDay === 0}
                            >
                                <IconChevronLeft />
                            </button>
                            <h2 className="text-xl md:text-2xl font-serif font-bold text-center w-full fade-in" key={`title-${currentDay}`}>
                                {dayData.day}, {dayData.date}
                            </h2>
                            <button 
                                onClick={() => setCurrentDay(prev => Math.min(itineraryData.length - 1, prev + 1))}
                                className={`p-2 rounded-full ${currentDay === itineraryData.length - 1 ? 'text-slate-300' : 'text-golf-800 hover:bg-golf-50'}`}
                                disabled={currentDay === itineraryData.length - 1}
                            >
                                <IconChevronRight />
                            </button>
                        </div>

                        {/* Content Grid */}
                        <div className="space-y-6 fade-in" key={`content-${currentDay}`}>
                            
                            {/* Location & Sleep Cards */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-3">
                                    <div className="bg-amber-100 p-2 rounded-lg text-amber-600"><IconSunrise /></div>
                                    <div>
                                        <p className="text-xs text-slate-400 uppercase tracking-wider font-semibold">Wake Up</p>
                                        <p className="font-bold text-slate-800">{dayData.wakeUp}</p>
                                    </div>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-3">
                                    <div className="bg-indigo-100 p-2 rounded-lg text-indigo-600"><IconMoon /></div>
                                    <div>
                                        <p className="text-xs text-slate-400 uppercase tracking-wider font-semibold">Sleep In</p>
                                        <p className="font-bold text-slate-800">{dayData.sleep}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Golf Section */}
                            {dayData.golf.length > 0 && (
                                <div className="bg-golf-800 text-white rounded-2xl shadow-lg overflow-hidden">
                                    <div className="px-5 py-4 border-b border-golf-700 bg-golf-900 flex items-center space-x-2">
                                        <IconFlag />
                                        <h3 className="font-serif font-bold text-lg">Golf Today</h3>
                                    </div>
                                    <div className="p-2">
                                        {dayData.golf.map((g, idx) => (
                                            <div key={idx} className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-golf-700 rounded-xl p-4 m-2">
                                                <div className="mb-2 sm:mb-0">
                                                    <h4 className="font-bold text-lg text-golf-50">{g.course}</h4>
                                                    <div className="flex items-center text-golf-100 text-sm mt-1 space-x-1">
                                                        <IconClock />
                                                        <span>Tee Time: {g.time}</span>
                                                    </div>
                                                </div>
                                                <div className="bg-gold-500 text-golf-900 font-bold px-4 py-2 rounded-lg shadow-sm">
                                                    {g.cost}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Schedule / To Do */}
                            {dayData.schedule.length > 0 && (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                    <h3 className="font-serif font-bold text-lg mb-4 text-golf-900 border-b pb-2">Itinerary & Activities</h3>
                                    <div className="space-y-4">
                                        {dayData.schedule.map((item, idx) => (
                                            <div key={idx} className="flex items-start">
                                                <div className="w-24 flex-shrink-0 text-sm font-semibold text-slate-500 pt-1">
                                                    {item.time}
                                                </div>
                                                <div className="flex-grow pl-4 border-l-2 border-slate-100">
                                                    <p className="text-slate-800 font-medium">{item.event}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Local Intel / City Guide */}
                            <div className="bg-slate-50 rounded-2xl shadow-inner border border-slate-200 p-5">
                                <div className="flex items-center space-x-2 mb-3 text-golf-800">
                                    <IconInfo />
                                    <h3 className="font-serif font-bold text-lg">Local Intel: {dayData.intel.city}</h3>
                                </div>
                                <p className="text-slate-600 text-sm mb-4 leading-relaxed">{dayData.intel.description}</p>
                                
                                <div className="mb-4">
                                    <h4 className="text-xs uppercase tracking-wider font-bold text-slate-400 mb-2">Accommodation</h4>
                                    <p className="text-slate-800 font-medium flex items-center">
                                        <span className="text-golf-600 mr-2"><IconMapPin /></span>
                                        {dayData.intel.hotel}
                                    </p>
                                </div>

                                {dayData.intel.hotspots.length > 0 && (
                                    <div>
                                        <h4 className="text-xs uppercase tracking-wider font-bold text-slate-400 mb-2">Bars & Restaurants</h4>
                                        <ul className="space-y-2">
                                            {dayData.intel.hotspots.map((spot, idx) => (
                                                <li key={idx} className="text-sm text-slate-700 flex items-start">
                                                    <span className="text-gold-500 mr-2 mt-0.5">•</span>
                                                    {spot}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>

                        </div>
                    </main>
                    
                    {/* Footer / Indicator */}
                    <footer className="text-center py-4 text-slate-400 text-sm">
                        Swipe left/right to navigate days
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
